<svg xmlns="http://www.w3.org/2000/svg" viewBox="115 90 330 332" width="100%" height="100%">
  <defs>
    <!-- Soft, realistic drop shadow for the vertical capsule -->
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0a3254" flood-opacity="0.08" />
    </filter>

    <!-- Original white-to-light-blue vertical gradient for the capsule -->
    <linearGradient id="capsule-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#f2f7fc" />
      <stop offset="100%" stop-color="#bad9f5" />
    </linearGradient>

    <!-- Soft grey/blue gradient for the horizontal tick fills -->
    <linearGradient id="tick-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f4f8fc" />
      <stop offset="100%" stop-color="#d9e8f7" />
    </linearGradient>

    <!-- Faithful gradients for the three blue bars -->
    <linearGradient id="top-bar-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0096ff" />
      <stop offset="100%" stop-color="#54d5ff" />
    </linearGradient>

    <linearGradient id="mid-bar-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#006eff" />
      <stop offset="100%" stop-color="#35c3ff" />
    </linearGradient>

    <linearGradient id="bot-bar-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0b4ec2" />
      <stop offset="100%" stop-color="#1e87f3" />
    </linearGradient>
  </defs>

  <!-- Left Side Horizontal Indicators -->
  <g id="left-ticks">
    <!-- Top Left Tick -->
    <rect x="156" y="179" width="60" height="5" rx="1.5" ry="1.5" fill="url(#tick-fill)" stroke="#b2cee8" stroke-width="1.2" />
    <!-- Bottom Left Tick -->
    <rect x="156" y="329" width="60" height="5" rx="1.5" ry="1.5" fill="url(#tick-fill)" stroke="#b2cee8" stroke-width="1.2" />
  </g>

  <!-- Right Side Horizontal Indicators -->
  <g id="right-ticks">
    <!-- Top Right Tick -->
    <rect x="296" y="179" width="60" height="5" rx="1.5" ry="1.5" fill="url(#tick-fill)" stroke="#b2cee8" stroke-width="1.2" />
    <!-- Bottom Right Tick -->
    <rect x="296" y="329" width="60" height="5" rx="1.5" ry="1.5" fill="url(#tick-fill)" stroke="#b2cee8" stroke-width="1.2" />
  </g>

  <!-- Horizontal Blue Bars -->
  <g id="blue-bars">
    <!-- Top Bar (Sky Blue) -->
    <polygon points="298,196 373,196 353,228 298,228" fill="url(#top-bar-grad)" stroke="url(#top-bar-grad)" stroke-width="4" stroke-linejoin="round" />
    
    <!-- Middle Bar (Medium Blue, dominant) -->
    <polygon points="298,240 403,240 383,272 298,272" fill="url(#mid-bar-grad)" stroke="url(#mid-bar-grad)" stroke-width="4" stroke-linejoin="round" />
    
    <!-- Bottom Bar (Royal Blue) -->
    <polygon points="298,284 353,284 333,316 298,316" fill="url(#bot-bar-grad)" stroke="url(#bot-bar-grad)" stroke-width="4" stroke-linejoin="round" />
  </g>

  <!-- Central Vertical Capsule -->
  <rect x="236" y="106" width="40" height="300" rx="20" ry="20" fill="url(#capsule-grad)" stroke="#accfed" stroke-width="1.5" filter="url(#soft-shadow)" />
</svg>
