<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <!-- Vibrant Violet to Deep Purple gradient for the left chevron -->
    <linearGradient id="gradLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/> <!-- Purple 500 -->
      <stop offset="100%" stop-color="#4C1D95"/> <!-- Purple 900 -->
    </linearGradient>
    
    <!-- Luminous Pink to Rich Purple gradient for the right chevron -->
    <linearGradient id="gradRight" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#F472B6"/> <!-- Pink 400 -->
      <stop offset="100%" stop-color="#7E22CE"/> <!-- Purple 700 -->
    </linearGradient>

    <!-- Subtle drop shadow to give depth between the interlocking shapes -->
    <filter id="shadowLeft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- 
    The logo is composed of two interlocking chevrons (< and >).
    When combined with thick, rounded strokes, they form an abstract, geometric 'H'.
    The overlapping center creates a sharp diamond cut-out, representing the "honing" of text.
  -->
  
  <!-- Left Chevron (>) -->
  <path d="M 36 32 L 80 64 L 36 96" 
        stroke="url(#gradLeft)" 
        stroke-width="24" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        filter="url(#shadowLeft)" />
  
  <!-- Right Chevron (<) -->
  <path d="M 92 32 L 48 64 L 92 96" 
        stroke="url(#gradRight)" 
        stroke-width="24" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        filter="url(#shadowLeft)" />
</svg>